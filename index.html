<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SweetBerry</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<nav>
<div><strong>🍓 SweetBerry</strong></div>
<div>
<a href="#">Главная</a>
<a href="#products">Каталог</a>
</div>
</nav>

<section class="hero">
<div class="hero-content">
<h1>Клубника в шоколаде</h1>
<p>Свежесть, стиль и вкус</p>
<a href="#products" class="btn">Смотреть каталог</a>
</div>
</section>

<section class="products" id="products">

<div class="card">
<h3>Набор 6 шт</h3>
<div class="price">1500 ₽</div>
<button onclick="addToCart()" class="btn">В корзину</button>
</div>

<div class="card">
<h3>Набор 12 шт</h3>
<div class="price">2500 ₽</div>
<button onclick="addToCart()" class="btn">В корзину</button>
</div>

<div class="card">
<h3>Премиум набор</h3>
<div class="price">3500 ₽</div>
<button onclick="addToCart()" class="btn">В корзину</button>
</div>

</section>

<div class="cart">
🛒 Корзина (<span id="cart-count">0</span>)
</div>

<footer>
© 2026 SweetBerry | Премиальный десерт
</footer>

<script src="script.js"></script>

</body>
</html>
